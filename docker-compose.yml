version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: ghostfolio-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ghostfolio
      POSTGRES_PASSWORD: strongpassword
      POSTGRES_DB: ghostfolio
    volumes:
      - ./pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ghostfolio-redis
    restart: unless-stopped

  ghostfolio:
    image: ghostfolio/ghostfolio:latest
    container_name: ghostfolio
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - "3333:3333"
    environment:
      DATABASE_URL: postgresql://ghostfolio:strongpassword@postgres:5432/ghostfolio
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: production
      ACCESS_TOKEN_SALT: {$ACCESS_TOKEN_SALT:change-me-in-env}
      JWT_SECRET_KEY: {$JWT_SECRET_KEY:change-me-in-env}